# AWS Batch Processing Optimization Configuration
# このファイルは main.py で読み込まれ、AWS EC2での実行を最適化します

# CPU最適化設定
[CPU]
# CPUコアへのプロセス固定を有効化（推奨: True）
use_cpu_affinity = True

# 使用するCPUコア数（0 = 自動、-1 = 全コア、N = N個のコア）
num_workers = 0

# プロセス優先度（-20〜19、低いほど高優先度）
process_priority = 0

# メモリ最適化設定
[MEMORY]
# 共有メモリを使用（大規模データ向け、推奨: False）
use_shared_memory = False

# 結果バッファサイズ（0 = 無制限）
result_buffer_size = 1000

# チャンクサイズ（auto = 自動計算、N = 固定値）
chunk_size = auto

# 並列処理設定
[PARALLEL]
# タスクキューのサイズ
task_queue_size = 100

# 結果取得のタイムアウト（秒）
result_timeout = 300

# プログレス更新間隔（秒）
progress_interval = 10

# AWS EC2インスタンスタイプ別の推奨設定
[INSTANCE_TYPES]
# t3.medium (2 vCPU, 4GB RAM)
t3.medium.workers = 1
t3.medium.chunk_size = 10

# t3.large (2 vCPU, 8GB RAM)
t3.large.workers = 1
t3.large.chunk_size = 20

# t3.xlarge (4 vCPU, 16GB RAM)
t3.xlarge.workers = 3
t3.xlarge.chunk_size = 20

# t3.2xlarge (8 vCPU, 32GB RAM)
t3.2xlarge.workers = 7
t3.2xlarge.chunk_size = 30

# c5.large (2 vCPU, 4GB RAM) - コンピュート最適化
c5.large.workers = 1
c5.large.chunk_size = 30

# c5.xlarge (4 vCPU, 8GB RAM) - コンピュート最適化
c5.xlarge.workers = 3
c5.xlarge.chunk_size = 40

# c5.2xlarge (8 vCPU, 16GB RAM) - コンピュート最適化
c5.2xlarge.workers = 7
c5.2xlarge.chunk_size = 50

# c5.4xlarge (16 vCPU, 32GB RAM) - コンピュート最適化
c5.4xlarge.workers = 15
c5.4xlarge.chunk_size = 50

# パフォーマンスチューニングのヒント
[TUNING]
# バッチサイズが大きい場合（>10000条件）
large_batch.chunk_size = 50
large_batch.progress_interval = 30

# メモリが限られている場合（<8GB）
low_memory.chunk_size = 5
low_memory.result_buffer_size = 100
low_memory.use_shared_memory = False

# CPU数が多い場合（>16コア）
high_cpu.workers = -1
high_cpu.chunk_size = 100
